<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"  lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado</title>
</head>
<body>
<h1>Listado de jugadores</h1>
<a th:href="@{/}">Regresar</a> | <a th:href="@{/jugadores/nuevo}">Agregar jugador</a>
<br>
<br>
<table border="1">
    <tr>
        <th>Id</th>
        <th>Nombre</th>
        <th>Posicion</th>
        <th>Acciones</th>
    </tr>
    <tbody>
    <tr th:each="jugador:${jugadores}">
        <td th:text=" ${jugador.id}"></td>
        <td th:text="${jugador.nombre}"></td>
        <td th:text="${jugador.posicion}"></td>
        <td>
            <a th:href="@{'/jugadores/actualizar/'+${jugador.getId()}}">Actualizar |</a>
            <a th:href="@{'/jugadores/eliminar/confirmar/' + ${jugador.id}}">Eliminar</a>
            <!-- <a th:href="@{'/materias/eliminar/'+${materia.getId()}}">Eliminar</a>-->
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
