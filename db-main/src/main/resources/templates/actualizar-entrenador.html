<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
</head>
<body>
<h1>Actualizar Entrenador</h1>
<form th:action="@{/entrenadores/guardar}" th:object="${entrenador}" method="post">
    <input type="hidden" th:field="*{id}">

    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}" required>
    <br><br>

    <label>Experiencia (años):</label>
    <input type="number" th:field="*{experiencia}" required>
    <br><br>

    <label>Edad:</label>
    <input type="number" th:field="*{edad}" required>
    <br><br>

    <input type="submit" value="Actualizar">
    <a th:href="@{/entrenadores}">Cancelar</a>
</form>
</body>
</html>
